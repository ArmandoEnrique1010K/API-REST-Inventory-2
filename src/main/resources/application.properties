spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}



spring.datasource.driver-class-name = com.mysql.cj.jdbc.Driver



# Update: Hibernate intenta crear tablas faltantes, agregar columnas nuevas, se utiliza en desarrollo
# Validate: Revisa si las tablas y columnas coinciden con las entidades, si algo no coinicide, falla al arrancar

# spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.ddl-auto=validate

# Mostrar queries SQL
spring.jpa.show-sql=false

# Formatear SQL (más legible)
spring.jpa.properties.hibernate.format_sql=true

# Mostrar parámetros (MUY importante)
logging.level.org.hibernate.SQL=DEBUG
# logging.level.org.hibernate.orm.jdbc.bind=TRACE

# STACKTRACE DE HIBERNATE
logging.level.org.hibernate.engine.internal.StatisticalLoggingSessionEventListener=DEBUG


spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


spring.servlet.multipart.enabled=true

spring.servlet.multipart.max-file-size=10MB

spring.servlet.multipart.max-request-size=10MB


spring.mvc.format.date=yyyy-MM-dd 

server.error.whitelabel.enabled=false

