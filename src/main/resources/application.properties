spring.application.name=inventoryApp

# Importacion de claves secretas (solamente en un entorno de desarrollo)
# spring.config.import=optional:application-secrets.properties

# SI SE VA A DESPLEGAR EN RENDER, SE TIENE QUE DEFINIR EL PUERTO COMO UNA VARIABLE DE ENTORNO
server.port=${PORT:8080}

# Añadir esto si no funciona la ejecución de la base de datos
# &allowPublicKeyRetrieval=true
# https://stackoverflow.com/questions/50379839/connection-java-mysql-public-key-retrieval-is-not-allowed


# UTILIZA VARIABLES DE ENTORNO SI VAS A DESPLEGAR LA API REST

# VARIABLES DE ENTORNO DE AIVEN (PARA DESPLEGAR LA BASE DE DATOS)
# ADVERTENCIA: NO COPIAR LA URL DE CONEXION DIRECTAMENTE DE AIVEN, SE REQUIERE HACER CIERTOS AJUSTES PARA QUE QUEDE DE LA SIGUIENTE MANERA:
# spring.datasource.url=jdbc:mysql://<host>:<puerto>/<nombre_BD>?ssl-mode=REQUIRED


# VARIABLES DE ENTORNO DE LA BASE DE DATOS

# EN UN ENTORNO DE PRODUCCIÓN
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.datasource.driver-class-name = com.mysql.cj.jdbc.Driver



# Update: Hibernate intenta crear tablas faltantes, agregar columnas nuevas, se utiliza en desarrollo
# Validate: Revisa si las tablas y columnas coinciden con las entidades, si algo no coinicide, falla al arrancar
# spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.ddl-auto=validate

# Mostrar queries SQL
spring.jpa.show-sql=false

# Formatear SQL (más legible)
spring.jpa.properties.hibernate.format_sql=true

# Mostrar parámetros (MUY importante)
logging.level.org.hibernate.SQL=DEBUG
# logging.level.org.hibernate.orm.jdbc.bind=TRACE

# STACKTRACE DE HIBERNATE
logging.level.org.hibernate.engine.internal.StatisticalLoggingSessionEventListener=DEBUG


spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.mvc.format.date=yyyy-MM-dd 

server.error.whitelabel.enabled=false

# server.servlet.context-path=/api
# logging.level.root=info
# logging.level.com.pe.inventoryapp.backend=debug
# logging.level.org.springframework.security=DEBUG



# Permite que spring interpreta "" como null
spring.jackson.deserialization.accept-empty-string-as-null-object=true

# VARIABLES DE ENTORNO
test.env.var=${TEST_EMV_VAR}
default.image.url=${DEFAULT_IMAGE_URL}
first.user.email=${FIRST_USER_EMAIL}
first.user.password=${FIRST_USER_PASSWORD}
mailersend.api.token=${MAILERSEND_API_TOKEN}
mailersend.test.domain=${MAILERSEND_TEST_DOMAIN}
cloudinary.cloud.name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api.key=${CLOUDINARY_API_KEY}
cloudinary.api.secret=${CLOUDINARY_API_SECRET}
frontend.url=${FRONTEND_URL}
demo.mode=${DEMO_MODE}