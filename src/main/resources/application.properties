spring.application.name=inventoryApp

# Importacion de claves secretas
spring.config.import=optional:application-secrets.properties

server.port = 8080

# Añadir esto si no funciona la ejecución de la base de datos
# &allowPublicKeyRetrieval=true
# https://stackoverflow.com/questions/50379839/connection-java-mysql-public-key-retrieval-is-not-allowed

# spring.datasource.url = jdbc:mysql://localhost:3306/db_inventory_app_backend?useSSL=false&serverTimezone=GMT-5&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
# spring.datasource.username=root
# spring.datasource.password=adminKing987#@
spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${DATASOURCE_USERNAME}
spring.datasource.password=${DATASOURCE_PASSWORD}


spring.datasource.driver-class-name = com.mysql.cj.jdbc.Driver



spring.jpa.hibernate.ddl-auto=update
# Mostrar queries SQL
spring.jpa.show-sql=false

# Formatear SQL (más legible)
spring.jpa.properties.hibernate.format_sql=true

# Mostrar parámetros (MUY importante)
logging.level.org.hibernate.SQL=DEBUG
# logging.level.org.hibernate.orm.jdbc.bind=TRACE

# STACKTRACE DE HIBERNATE
logging.level.org.hibernate.engine.internal.StatisticalLoggingSessionEventListener=DEBUG


spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


spring.servlet.multipart.enabled=true

spring.servlet.multipart.max-file-size=10MB

spring.servlet.multipart.max-request-size=10MB


spring.mvc.format.date=yyyy-MM-dd 

server.error.whitelabel.enabled=false

# server.servlet.context-path=/api
# logging.level.root=info
# logging.level.com.pe.inventoryapp.backend=debug
# logging.level.org.springframework.security=DEBUG


# CONFIGURACION DE LAS CREDENCIALES DE CORREO
# CREAR UN ARCHIVO ".env" EN LA RAIZ DEL PROYECTO
# mailersend.api.token=
# mailersend.test.domain=


# Permite que spring interpreta "" como null
spring.jackson.deserialization.accept-empty-string-as-null-object=true

